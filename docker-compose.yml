services:
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg14
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-upbit}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ${PROJECT_ROOT:-.}/initdb:/docker-entrypoint-initdb.d:ro
    restart: always
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-upbit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  collector:
    build:
      context: .
    container_name: upbit-collector
    environment:
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-upbit}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      UPBIT_MARKETS_FILE: /app/markets.txt
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitor

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost}
      POSTGRES_DB: ${POSTGRES_DB:-upbit}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ${PROJECT_ROOT:-.}/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${PROJECT_ROOT:-.}/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitor

  nginx:
    image: nginx:1.27-alpine
    container_name: upbit-nginx
    ports:
      - "80:80"
    volumes:
      - ${PROJECT_ROOT:-.}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      grafana:
        condition: service_started
    restart: unless-stopped
    networks:
      - monitor

networks:
  monitor:
    driver: bridge

volumes:
  timescale_data:
  grafana_data:
